<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Categorías | BIANTI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>
  <div class="layout">
    <!-- ✅ HOST ÚNICO OFICIAL DEL SIDEBAR -->
    <div id="sidebar-host"></div>

    <main class="main">
      <div class="head">
        <div>
          <h1>Categorías</h1>
          <div class="muted">CRUD de categorías (orden, visibilidad y uso de talles).</div>
        </div>
        <div class="actions">
          <button class="btn primary" id="btnNuevaCat">➕ Nueva</button>
        </div>
      </div>

      <div class="panel">
        <!-- ✅ ID EXACTO que usa el JS -->
        <table class="table" id="tablaCats">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>

  <!-- ✅ Calentamiento de admin: protege + sidebar -->
  <script type="module">
    import { requireAdmin, logout } from "../assets/js/admin/admin-core.js";

    // 1) Protege la página
    requireAdmin();

    // 2) Inyecta sidebar en el host correcto
    const host = document.getElementById("sidebar-host");
    if (host) {
      const res = await fetch("./_sidebar.html");
      host.innerHTML = await res.text();

      // 3) Hook logout
      document.getElementById("btnLogout")?.addEventListener("click", logout);
    }

    // 4) Por si el sidebar usa onclick="logout()"
    window.logout = logout;
  </script>

  <!-- CRUD categorías -->
  <script type="module" src="../assets/js/admin/categorias.js"></script>
</body>
</html>
