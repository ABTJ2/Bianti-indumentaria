<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estadísticas | Bianti-Indumentaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <style>
    .cardrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}
    .cardrow .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;text-align:center;min-height:80px;display:flex;flex-direction:column;justify-content:center}
    .cardrow .k{font-size:12px;opacity:.75}
    .cardrow .v{font-size:24px;font-weight:900;margin-top:4px}
    .formgrid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}
    @media(max-width:720px){.cardrow{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-host"></div>
    <main class="main">
      <div class="head">
        <div>
          <h1>Estadísticas</h1>
          <div class="muted">Vistas/clics/scroll/WhatsApp (tabla eventos).</div>
        </div>
      </div>

      <div class="panel">
        <div class="formgrid">
          <div class="field">
            <label class="label">Rango</label>
            <select id="range" class="input">
              <option value="7">Últimos 7 días</option>
              <option value="30" selected>Últimos 30 días</option>
              <option value="90">Últimos 90 días</option>
            </select>
          </div>
          <div>
            <label class="label">&nbsp;</label>
            <button class="btn btnPrimary" id="btnReload">Recargar</button>
          </div>
        </div>
      </div>

      <div class="cardrow">
        <div class="card"><div class="k">Vistas</div><div class="v" id="kpi_view">—</div></div>
        <div class="card"><div class="k">Clicks</div><div class="v" id="kpi_click">—</div></div>
        <div class="card"><div class="k">Scroll</div><div class="v" id="kpi_scroll">—</div></div>
        <div class="card"><div class="k">WhatsApp</div><div class="v" id="kpi_wa">—</div></div>
      </div>

      <div class="panel" style="margin-top:12px">
        <strong>Top productos por vistas</strong>
        <div style="margin-top:8px">
          <table class="table" id="tablaTop"></table>
        </div>
      </div>

      <div class="panel" style="margin-top:14px">
        <strong>Eventos por día</strong>
        <div class="chartBox" style="margin-top:8px">
          <canvas id="chart" height="120"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script type="module">
    import { requireAdmin, logout, injectSidebar } from "../assets/js/admin/admin-core.js";
    requireAdmin();
    await injectSidebar();
    window.logout = logout;
  </script>
  <script type="module" src="../assets/js/admin/estadisticas.js"></script>
</body>
</html>
