<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ventas | Bianti-Indumentaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="layout">
    <div id="sidebar-host"></div>
    <main class="main">
      <div class="head">
        <div>
          <h1>Ventas</h1>
          <div class="muted">Registro tipo Excel + export CSV.</div>
        </div>
        <div class="actions">
          <button class="btn btnPrimary" id="btnNuevaVenta">Nueva venta</button>
          <button class="btn" id="btnExport">Exportar CSV</button>
        </div>
      </div>

      <div class="panel">
        <div class="tableWrap">
          <table class="table" id="tablaVentas"></table>
        </div>
      </div>

      <div class="panel" style="margin-top:14px">
        <strong>Totales</strong>
        <div class="muted" id="totales">—</div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script type="module">
    import { requireAdmin, logout, injectSidebar } from "../assets/js/admin/admin-core.js";
    requireAdmin();
    await injectSidebar();
    window.logout = logout;
  </script>
  <script type="module" src="../assets/js/admin/ventas.js"></script>
</body>
</html>
