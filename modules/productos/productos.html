<div class="pageHead"><div><h1>Productos</h1><p class="moduleIntro">Administrá los productos del catálogo. Podés crear, editar, mostrar, ocultar, cambiar disponibilidad, revisar stock real y eliminar.</p></div><div class="actionsRow"><button class="btn btnDangerSoft" id="bulkDeleteMode" type="button" title="Eliminar varios productos" aria-label="Eliminar varios productos">Eliminar varios productos</button><button class="btn btnPrimary" id="newProduct">Crear producto</button></div></div>
<div class="toolbar">
  <label>Buscar ID o nombre<input class="input" id="prodQ" placeholder="Ej: 1024 o remera"></label>
  <label>Categoría<select class="select" id="prodCat"><option value="">Todas</option></select></label>
  <label>Visible<select class="select" id="prodVisible"><option value="">Todos</option><option value="1">Visible</option><option value="0">Oculto</option></select></label>
  <label>Disponible<select class="select" id="prodAvail"><option value="">Todos</option><option value="1">Disponible</option><option value="0">No disponible</option></select></label>
  <label>Stock<select class="select" id="prodStock"><option value="">Todos</option><option value="con">Con stock</option><option value="sin">Sin stock</option><option value="bajo">Stock bajo</option></select></label>
  <label>Precio mín.<input class="input" id="prodMin" type="number" min="0" step="0.01"></label>
  <label>Precio máx.<input class="input" id="prodMax" type="number" min="0" step="0.01"></label>
  <label>Por página<select class="select" id="prodPageSize"><option>25</option><option>50</option><option>100</option></select></label>
  <button class="btn" id="prodClear" type="button">Limpiar</button>
</div>
<div class="status hidden" id="prodStatus"></div>
<div id="productFormHost"></div>
<section class="panel tablePanel">
  <div class="tableHeader"><div><strong>Listado de productos</strong><br><span id="prodCount">0 productos</span><br><span id="prodPageRange">Mostrando 0 de 0</span></div><div class="actionsRow actionsRight"><button class="btn btnSmall" id="prodPrev">Anterior</button><span class="paginationInfo" id="prodPageInfo">Página 1</span><button class="btn btnSmall" id="prodNext">Siguiente</button></div></div>
  <div class="bulkBar hidden" id="prodBulkBar"><strong id="prodSelectedCount">0 productos seleccionados</strong><div class="actionsRow"><button class="btn btnSmall" id="prodSelectAllResults" type="button">Seleccionar todos los resultados</button><button class="btn btnDanger btnSmall" id="prodDeleteSelected" type="button" disabled>Eliminar seleccionados</button><button class="btn btnSmall" id="prodBulkClear" type="button">Limpiar selección</button><button class="btn btnSmall" id="prodBulkCancel" type="button">Cancelar</button></div></div>
  <div class="tableWrap"><table class="compactTable productTable mobileCards" id="prodTable"><thead><tr><th class="colSelect bulkOnly hidden"><input type="checkbox" id="prodMasterCheck" aria-label="Seleccionar productos visibles"></th><th class="colThumb">Foto</th><th class="colId">ID</th><th class="colName">Nombre</th><th class="colCat">Categoría</th><th class="colSizes">Talles</th><th class="colStock">Stock</th><th class="colPrice">Precio</th><th class="colState">Visible</th><th class="colState">Disponible</th><th class="colActions">Acciones</th></tr></thead><tbody id="prodRows"></tbody></table></div>
</section>
